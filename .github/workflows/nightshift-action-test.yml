name: Nightshift Action Test

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode'
        type: boolean
        default: true
      provider:
        description: 'Provider to test'
        type: choice
        options:
          - claude
          - codex
          - opencode
          - copilot
        default: claude

permissions:
  contents: write
  pull-requests: write

jobs:
  nightshift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Nightshift
        id: nightshift
        uses: ./
        with:
          provider: ${{ inputs.provider || 'claude' }}
          dry-run: ${{ inputs.dry-run || true }}
          max-tasks: 1
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-state: true

      - name: Show outputs
        run: |
          echo "PR URL: ${{ steps.nightshift.outputs.pr-url }}"
          echo "Report: ${{ steps.nightshift.outputs.report-path }}"
          echo "Completed: ${{ steps.nightshift.outputs.tasks-completed }}"
          echo "Failed: ${{ steps.nightshift.outputs.tasks-failed }}"
          echo "Summary: ${{ steps.nightshift.outputs.summary }}"
