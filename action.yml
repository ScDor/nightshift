name: 'Nightshift'
description: 'Run Nightshift AI coding agent in GitHub Actions'
branding:
  icon: 'moon'
  color: 'purple'

inputs:
  version:
    description: 'Nightshift version to install (e.g. v1.2.3 or latest)'
    required: false
    default: 'latest'
  provider:
    description: 'Provider preference: claude, codex, opencode, copilot, or comma-separated for fallback'
    required: false
    default: 'claude'
  anthropic-api-key:
    description: 'Anthropic API key (for Claude provider)'
    required: false
  claude-code-oauth-token:
    description: 'Claude Code OAuth token (alternative to API key for Pro/Max users)'
    required: false
  openai-api-key:
    description: 'OpenAI API key (for Codex provider)'
    required: false
  opencode-api-key:
    description: 'OpenCode.ai API key (for OpenCode Zen models)'
    required: false
  github-token:
    description: 'GitHub token for Copilot auth and repo operations (gh CLI, PR creation)'
    required: false
    default: ${{ github.token }}
  config:
    description: 'Inline nightshift YAML config string'
    required: false
  config-path:
    description: 'Path to existing nightshift.yaml'
    required: false
  project-path:
    description: 'Project directory to run on'
    required: false
    default: '.'
  max-projects:
    description: 'Max projects to process per run'
    required: false
    default: '1'
  max-tasks:
    description: 'Max tasks per project'
    required: false
    default: '1'
  task:
    description: 'Run a specific task by name'
    required: false
  dry-run:
    description: 'Show preflight and exit without executing'
    required: false
    default: 'false'
  ignore-budget:
    description: 'Bypass budget checks'
    required: false
    default: 'false'
  cache-state:
    description: 'Cache the nightshift state DB between runs'
    required: false
    default: 'true'
  cache-key-suffix:
    description: 'Suffix for cache key (e.g. matrix identifier)'
    required: false

outputs:
  pr-url:
    description: 'URL of created PR (if any)'
    value: ${{ steps.run.outputs.pr-url }}
  report-path:
    description: 'Path to JSON run report'
    value: ${{ steps.run.outputs.report-path }}
  tasks-completed:
    description: 'Number of completed tasks'
    value: ${{ steps.run.outputs.tasks-completed }}
  tasks-failed:
    description: 'Number of failed tasks'
    value: ${{ steps.run.outputs.tasks-failed }}
  summary:
    description: 'Human-readable run summary'
    value: ${{ steps.run.outputs.summary }}

runs:
  using: composite
  steps:
    - name: Install Nightshift
      shell: bash
      run: ${GITHUB_ACTION_PATH}/scripts/install-nightshift.sh
      env:
        VERSION: ${{ inputs.version }}

    - name: Install provider CLIs
      shell: bash
      run: ${GITHUB_ACTION_PATH}/scripts/install-providers.sh
      env:
        PROVIDERS: ${{ inputs.provider }}

    - name: Restore state cache
      if: inputs.cache-state == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.local/share/nightshift/nightshift.db
        key: nightshift-state-${{ runner.os }}-${{ hashFiles(inputs.config-path || 'nightshift.yaml') }}-${{ inputs.cache-key-suffix }}-${{ github.run_id }}
        restore-keys: |
          nightshift-state-${{ runner.os }}-${{ hashFiles(inputs.config-path || 'nightshift.yaml') }}-${{ inputs.cache-key-suffix }}-
          nightshift-state-${{ runner.os }}-

    - name: Configure git
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Authenticate gh CLI
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "${GH_TOKEN}" | gh auth login --with-token

    - name: Run Nightshift
      id: run
      shell: bash
      run: ${GITHUB_ACTION_PATH}/scripts/run-nightshift.sh
      env:
        PROVIDERS: ${{ inputs.provider }}
        CONFIG: ${{ inputs.config }}
        CONFIG_PATH: ${{ inputs.config-path }}
        PROJECT_PATH: ${{ inputs.project-path }}
        MAX_PROJECTS: ${{ inputs.max-projects }}
        MAX_TASKS: ${{ inputs.max-tasks }}
        TASK: ${{ inputs.task }}
        DRY_RUN: ${{ inputs.dry-run }}
        IGNORE_BUDGET: ${{ inputs.ignore-budget }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENCODE_API_KEY: ${{ inputs.opencode-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GH_TOKEN: ${{ inputs.github-token }}
